name: Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Update CommonLibF4 to latest
        run: git submodule update --remote lib/commonlibf4

      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: xmake f -p windows -a x64 --mode=releasedbg -y

      - name: Build
        run: xmake build

      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: BakaPowerArmorStorage-NG
          path: build/windows/x64/releasedbg/BakaPowerArmorStorage.dll
